function renderCap() {
  const session = (window.getSessionCap || getSessionCap)();

  if (!session) return renderCapLogin();

  const team = state.config.teams[session.teamId];
  const currentAtelier = getTeamAtelierForRotation(session.teamId, state.currentRotation);
  const nextAtelier = getTeamAtelierForRotation(session.teamId, state.currentRotation + 1);
  const remaining = getTimerRemaining();
  const total = getTeamScore(session.teamId);

  return `
    <div class="mobile-view fade-in">
      <div class="mobile-header">
        <div class="kicker">Capitaine</div>
        <h1>${escapeHtml(teamDisplayName(team))}</h1>
      </div>

      ${currentAtelier ? `
        <div class="cap-status">
          <div class="kicker">Atelier en cours · Rotation ${state.currentRotation}</div>
          <div class="cap-status-letter">${currentAtelier.key}</div>
          <div class="cap-status-name">${currentAtelier.name}</div>
          <div class="cap-status-location">
            <span class="cap-status-location-arrow">→</span>
            <span class="cap-status-location-label">RDV au</span>
            <span class="cap-status-location-value">${currentAtelier.location}</span>
          </div>
          <div class="cap-status-responsible">
            <span class="cap-status-responsible-label">Responsable</span>
            <span class="cap-status-responsible-value">${currentAtelier.responsible}</span>
          </div>
          <div class="cap-status-timer">
            <div class="cap-status-timer-label">${state.phase === 'transition' ? 'Transition' : state.phase === 'epreuve' ? 'Temps restant' : 'En attente'}</div>
            <div class="cap-status-timer-value" data-timer>${formatTime(remaining)}</div>
          </div>
        </div>
      ` : `
        <div class="cap-status">
          <div class="kicker">Statut</div>
          <div class="cap-status-name" style="margin-top: 16px;">
            ${state.currentRotation === 0 ? "Le challenge n'a pas encore commencé" :
              state.currentRotation > N_ROTATIONS ? "Challenge terminé" :
              "En attente de la prochaine rotation"}
          </div>
        </div>
      `}

      ${currentAtelier && currentAtelier.key === 'O' ? `
        <div class="cap-brief cap-brief-organisation">
          <div class="kicker">Consignes de l'atelier</div>
          <div class="cap-brief-title">Chasse au trésor</div>
          <div class="cap-brief-intro">
            Trouvez ces 10 objets au village, ramenez-les ici.
          </div>
          <ul class="cap-brief-list">
            <li>Casquette</li>
            <li>Coupe-ongles</li>
            <li>Dissolvant</li>
            <li>Carte postale</li>
            <li>Yop</li>
            <li>4 couleurs</li>
            <li>T-shirt avec une illustration</li>
            <li>Lunettes de soleil</li>
            <li>Tasbih</li>
            <li>Boîte de sucre</li>
          </ul>
          <div class="cap-brief-rules">
            <div class="cap-brief-rule">
              <span class="cap-brief-rule-label">Budget max</span>
              <span class="cap-brief-rule-value">20 €</span>
            </div>
            <div class="cap-brief-rule">
              <span class="cap-brief-rule-label">Preuve</span>
              <span class="cap-brief-rule-value">Ticket de caisse</span>
            </div>
          </div>
        </div>
      ` : ''}

      <div class="cap-next">
        <div class="kicker">Prochain atelier</div>
        ${nextAtelier ? `
          <div class="cap-next-content">
            <div class="cap-next-letter">${nextAtelier.key}</div>
            <div class="cap-next-info">
              <div class="cap-next-name">${nextAtelier.name}</div>
              <div class="cap-next-location">→ ${nextAtelier.location}</div>
              <div class="cap-next-responsible">Responsable : ${nextAtelier.responsible}</div>
            </div>
          </div>
        ` : `
          <div class="cap-next-empty">${state.currentRotation >= N_ROTATIONS ? "Aucun — c'est le dernier" : "À venir"}</div>
        `}
      </div>

      <div class="cap-scores">
        <div class="kicker">Vos scores</div>
        <div class="cap-scores-list">
          ${EPREUVES.map(e => {
            const key = `${session.teamId}-${e.key}`;
            const entry = state.scores[key];
            return `
              <div class="cap-score-row">
                <div class="cap-score-letter">${e.key}</div>
                <div class="cap-score-name">${e.name}</div>
                <div>
                  ${entry ?
                    `<span class="cap-score-value">${entry.points}<span style="font-size:13px;color:var(--muted);font-weight:400"> /${e.maxPts}</span></span>` :
                    `<span class="cap-score-pending">—</span>`
                  }

          }).join('')}

        <div class="cap-total">
          <div class="cap-total-label">Total</div>
          <div class="cap-total-value">${total}<span style="font-size:18px;color:var(--muted);"> / 12</span></div>
        </div>
      </div>

      <button class="admin-btn" style="margin-top:20px;width:100%" data-action="cap-logout">Changer d'équipe</button>
    </div>
  `;
}

function renderCapLogin() {
  return `
    <div class="mobile-view fade-in">

function renderResp() {
  const session = (window.getSessionResp || getSessionResp)();
  if (!session) return renderRespLogin();

  const atelier = EPREUVES.find(e => e.key === session.atelierKey);
  const allRotations = getAtelierScheduleForAllRotations(atelier.key);
  const currentRotation = state.currentRotation;

  // Which row is expanded? Tracked in a local UI state var.
  if (typeof window._respExpanded === 'undefined') {
    // On first load, default to current rotation (if in range) else rotation 1
    window._respExpanded = (currentRotation >= 1 && currentRotation <= N_ROTATIONS)
      ? currentRotation : 1;
  }
  const expanded = window._respExpanded;

  return `
    <div class="mobile-view fade-in">
      <div class="mobile-header">
        <div class="kicker">Responsable d'atelier</div>
        <h1>Saisie<br><em>des points</em></h1>
      </div>

      <div class="resp-card">
        <div class="resp-atelier-display">
          <div class="resp-atelier-letter">${atelier.key}</div>
          <div class="resp-atelier-info">
            <div class="kicker">Atelier</div>
            <div class="resp-atelier-name">${atelier.name}</div>
          </div>
        </div>

        <div class="resp-timer">
          <div class="resp-timer-label">${state.phase === 'transition' ? 'Transition' : state.phase === 'epreuve' ? 'Temps restant' : 'En attente'}</div>
          <div class="resp-timer-value" data-timer>${formatTime(getTimerRemaining())}</div>
        </div>

        <div class="resp-free-hint">
          Vous pouvez saisir les points pour n'importe quelle rotation, à tout moment. Tapez sur une ligne pour la développer.
        </div>

        <div class="resp-rotations">
          ${allRotations.map((teamIds, rIdx) => {
            const rotationNum = rIdx + 1;
            const isCurrent = rotationNum === currentRotation;
            const isExpanded = rotationNum === expanded;
            return renderRespRotationRow(atelier, teamIds, rotationNum, isCurrent, isExpanded);
          }).join('')}
        </div>
      </div>

      <button class="admin-btn" style="margin-top:20px;width:100%" data-action="resp-logout">Changer d'atelier</button>
    </div>
  `;
}

function renderRespRotationRow(atelier, teamIds, rotationNum, isCurrent, isExpanded) {
  const teamA = state.config.teams[teamIds[0]];
  const teamB = state.config.teams[teamIds[1]];

  // Determine status
  let status = 'pending'; // pending | done
  let scoreSummary = '';
  if (atelier.physical) {
    const phys = state.scoresPhysical || {};
    const keyA = `${teamIds[0]}-${rotationNum}`;
    const keyB = `${teamIds[1]}-${rotationNum}`;
    const pA = phys[keyA];
    const pB = phys[keyB];
    if (pA && pB && pA.foot !== null && pA.foot !== undefined &&
        pA.volley !== null && pA.volley !== undefined) {
      status = 'done';
      const totalA = (pA.foot ?? 0) + (pA.volley ?? 0);
      const totalB = (pB.foot ?? 0) + (pB.volley ?? 0);
      scoreSummary = `${totalA} · ${totalB}`;
    }
  } else {
    const sA = state.scores[`${teamIds[0]}-${atelier.key}`];
    const sB = state.scores[`${teamIds[1]}-${atelier.key}`];
    if (sA && sB && sA.rotation === rotationNum) {
      status = 'done';
      scoreSummary = `${sA.points} · ${sB.points}`;
    }
  }

  const rowClass = [
    'resp-rotation-row',
    isCurrent ? 'current' : '',
    isExpanded ? 'expanded' : '',
    status === 'done' ? 'done' : ''
  ].filter(Boolean).join(' ');

  return `
    <div class="${rowClass}">
      <button class="resp-rotation-head" data-resp-toggle="${rotationNum}">
        <div class="resp-rotation-num">
          <span class="resp-rotation-num-label">Rotation</span>
          <span class="resp-rotation-num-value">${rotationNum}</span>
        </div>
        <div class="resp-rotation-teams">
          <div class="resp-rotation-team-a">${escapeHtml(teamDisplayName(teamA))}</div>
          <div class="resp-rotation-vs">vs</div>
          <div class="resp-rotation-team-b">${escapeHtml(teamDisplayName(teamB))}</div>
        </div>
        <div class="resp-rotation-status">
          ${isCurrent ? '<span class="resp-rotation-badge-live">En cours</span>' : ''}
          ${status === 'done' ?
            `<span class="resp-rotation-score">${scoreSummary}</span>` :
            `<span class="resp-rotation-pending">À saisir</span>`
          }
          <span class="resp-rotation-chevron">${isExpanded ? '▲' : '▼'}</span>
        </div>
      </button>
      ${isExpanded ? `
        <div class="resp-rotation-body">
          ${atelier.physical
            ? renderRespPhysicalInputs(teamIds, rotationNum)
            : renderRespStandardInputs(teamIds, atelier, rotationNum)}
        </div>
      ` : ''}
    </div>
  `;
}

function renderRespStandardInputs(teamIds, atelier, rotationNum) {
  const teamA = state.config.teams[teamIds[0]];
  const teamB = state.config.teams[teamIds[1]];
  const entryA = state.scores[`${teamIds[0]}-${atelier.key}`];
  const currentOutcome = entryA?.rotation === rotationNum ?
    (entryA.points === 2 ? 'A' : entryA.points === 1 ? 'tie' : 'B') : null;

  const submitted = currentOutcome !== null;

  return `
    <div class="resp-sub-label" style="margin-top:4px">Résultat</div>
    <div class="resp-outcome-selector">
      <button class="resp-outcome-btn ${currentOutcome === 'A' ? 'win' : ''}"
              data-outcome="A" data-rotation="${rotationNum}">
        ${escapeHtml(teamShortName(teamA))} gagne
      </button>
      <button class="resp-outcome-btn ${currentOutcome === 'tie' ? 'tie' : ''}"
              data-outcome="tie" data-rotation="${rotationNum}">
        Égalité
      </button>
      <button class="resp-outcome-btn ${currentOutcome === 'B' ? 'win' : ''}"
              data-outcome="B" data-rotation="${rotationNum}">
        ${escapeHtml(teamShortName(teamB))} gagne
      </button>
    </div>
    ${submitted ? `<div class="resp-submitted">Points enregistrés — modifiable à tout moment</div>` : ''}
  `;
}

function renderRespPhysicalInputs(teamIds, rotationNum) {
  const teamA = state.config.teams[teamIds[0]];
  const teamB = state.config.teams[teamIds[1]];
  // Storage: state.scoresPhysical keyed by "teamId-rotationNum" -> { foot, volley }
  const phys = state.scoresPhysical || {};
  const keyA = `${teamIds[0]}-${rotationNum}`;
  const keyB = `${teamIds[1]}-${rotationNum}`;
  const physA = phys[keyA] || { foot: null, volley: null };
  const physB = phys[keyB] || { foot: null, volley: null };

  function outcomeLetter(a, b, letter) {
    if (a === null || a === undefined || b === null || b === undefined) return null;
    if (a === 2 && b === 0) return letter === 'A' ? 'win' : null;
    if (a === 0 && b === 2) return letter === 'B' ? 'win' : null;
    if (a === 1 && b === 1) return letter === 'tie' ? 'tie' : null;
    return null;
  }
  const footA = physA.foot, footB = physB.foot;
  const volA = physA.volley, volB = physB.volley;
  const isDone = (footA !== null && volA !== null);

  return `
    <div class="resp-physical-notice">
      Épreuve double : football + volley. Chaque match se note séparément.
    </div>

    <div class="resp-sub-section">
      <div class="resp-sub-label">Football</div>
      <div class="resp-outcome-selector">
        <button class="resp-outcome-btn ${outcomeLetter(footA, footB, 'A') ? 'win' : ''}"
                data-phys="foot" data-phys-outcome="A" data-rotation="${rotationNum}">
          ${escapeHtml(teamShortName(teamA))}
        </button>
        <button class="resp-outcome-btn ${outcomeLetter(footA, footB, 'tie') ? 'tie' : ''}"
                data-phys="foot" data-phys-outcome="tie" data-rotation="${rotationNum}">
          Égalité
        </button>
        <button class="resp-outcome-btn ${outcomeLetter(footA, footB, 'B') ? 'win' : ''}"
                data-phys="foot" data-phys-outcome="B" data-rotation="${rotationNum}">
          ${escapeHtml(teamShortName(teamB))}
        </button>
      </div>
    </div>

    <div class="resp-sub-section">
      <div class="resp-sub-label">Volley</div>
      <div class="resp-outcome-selector">
        <button class="resp-outcome-btn ${outcomeLetter(volA, volB, 'A') ? 'win' : ''}"
                data-phys="volley" data-phys-outcome="A" data-rotation="${rotationNum}">
          ${escapeHtml(teamShortName(teamA))}
        </button>
        <button class="resp-outcome-btn ${outcomeLetter(volA, volB, 'tie') ? 'tie' : ''}"
                data-phys="volley" data-phys-outcome="tie" data-rotation="${rotationNum}">
          Égalité
        </button>
        <button class="resp-outcome-btn ${outcomeLetter(volA, volB, 'B') ? 'win' : ''}"
                data-phys="volley" data-phys-outcome="B" data-rotation="${rotationNum}">
          ${escapeHtml(teamShortName(teamB))}
        </button>
      </div>
    </div>

    ${isDone ? `<div class="resp-submitted">Points enregistrés — modifiable à tout moment</div>` : ''}
  `;
}

// CUSTOM CONFIRM & TOAST (native confirm() is blocked in sandboxed iframes)
// ============================================================
function showConfirm(title, message, { danger = false, confirmLabel = 'Confirmer', cancelLabel = 'Annuler' } = {}) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-card" role="dialog" aria-modal="true">
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(message)}</p>
        <div class="modal-actions">
          <button class="modal-btn cancel">${escapeHtml(cancelLabel)}</button>
          <button class="modal-btn confirm ${danger ? 'danger' : ''}">${escapeHtml(confirmLabel)}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const done = (v) => {
      overlay.remove();
      resolve(v);
    };
    overlay.querySelector('.cancel').onclick = () => done(false);
    overlay.querySelector('.confirm').onclick = () => done(true);
    overlay.onclick = (e) => { if (e.target === overlay) done(false); };
  });
}

function showToast(message, duration = 2500) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// EVENT HANDLERS
// ============================================================
function attachEventHandlers(route) {
  // Capitaine login
  document.querySelectorAll('[data-action="cap-login"]').forEach(btn => {
    btn.onclick = () => {
      const teamId = parseInt(document.getElementById('cap-team-select').value, 10);
      const code = document.getElementById('cap-code-input').value.trim();
      const errEl = document.getElementById('cap-error');
      if (isNaN(teamId)) {
        errEl.textContent = 'Veuillez sélectionner une équipe.';
        errEl.style.display = 'block';
        return;
      }
      const team = state.config.teams[teamId];
      if (team.code !== code) {
        errEl.textContent = 'Code incorrect.';
        errEl.style.display = 'block';
        return;
      }
      (window.setSessionCap || setSessionCap)({ teamId });
      render();
    };
  });
  document.querySelectorAll('[data-action="cap-logout"]').forEach(btn => {
    btn.onclick = () => {
      (window.setSessionCap || setSessionCap)(null);
      render();
    };
  });

  // Responsable login
  document.querySelectorAll('[data-action="resp-login"]').forEach(btn => {
    btn.onclick = () => {
      const atelierKey = document.getElementById('resp-atelier-select').value;
      const code = document.getElementById('resp-code-input').value.trim();
      const errEl = document.getElementById('resp-error');
      if (!atelierKey) {
        errEl.textContent = 'Veuillez sélectionner un atelier.';
        errEl.style.display = 'block';
        return;
      }
      if (code !== 'CAPEO2026') {
        errEl.textContent = 'Code incorrect.';
        errEl.style.display = 'block';
        return;
      }
      (window.setSessionResp || setSessionResp)({ atelierKey });
      render();
    };
  });
  document.querySelectorAll('[data-action="resp-logout"]').forEach(btn => {
    btn.onclick = () => {
      (window.setSessionResp || setSessionResp)(null);
      render();
    };
  });

  document.querySelectorAll('[data-action="admin-login"]').forEach(btn => {
    btn.onclick = () => {
      const code = document.getElementById('admin-code-input').value.trim();
      const errEl = document.getElementById('admin-error');
      if (code !== ADMIN_CODE) {
        errEl.textContent = 'Code incorrect.';
        errEl.style.display = 'block';
        return;
      }
      (window.setSessionAdmin || setSessionAdmin)({ ok: true });
      render();
    };
  });
  document.querySelectorAll('[data-action="admin-logout"]').forEach(btn => {
    btn.onclick = () => {
      (window.setSessionAdmin || setSessionAdmin)(null);
      render();
    };
  });

  // Responsable outcome selector (standard)
  // Responsable: row expand/collapse
  document.querySelectorAll('[data-resp-toggle]').forEach(btn => {
    btn.onclick = () => {
      const n = parseInt(btn.dataset.respToggle, 10);
      window._respExpanded = (window._respExpanded === n) ? null : n;
      render();
    };
  });

  // Responsable standard outcome selector (any rotation)
  document.querySelectorAll('[data-outcome]').forEach(btn => {
    btn.onclick = async () => {
      const session = (window.getSessionResp || getSessionResp)();
      if (!session) return;
      const atelier = EPREUVES.find(e => e.key === session.atelierKey);
      const rotation = parseInt(btn.dataset.rotation, 10);
      if (isNaN(rotation)) return;
      const pairs = getAtelierScheduleForAllRotations(atelier.key);
      const teamIds = pairs[rotation - 1];
      if (!teamIds || teamIds.length !== 2) return;
      const outcome = btn.dataset.outcome;

      let pointsA, pointsB;
      if (outcome === 'A') { pointsA = 2; pointsB = 0; }
      else if (outcome === 'B') { pointsA = 0; pointsB = 2; }
      else { pointsA = 1; pointsB = 1; }

      const entryA = { points: pointsA, rotation };
      const entryB = { points: pointsB, rotation };
      state.scores[`${teamIds[0]}-${atelier.key}`] = entryA;
      state.scores[`${teamIds[1]}-${atelier.key}`] = entryB;
      await saveScores({
        [`${teamIds[0]}-${atelier.key}`]: entryA,
        [`${teamIds[1]}-${atelier.key}`]: entryB
      });
      render();
    };
  });

  // Responsable physical outcome selector (any rotation, keyed storage)
  document.querySelectorAll('[data-phys]').forEach(btn => {
    btn.onclick = async () => {
      const session = (window.getSessionResp || getSessionResp)();
      if (!session) return;
      const atelier = EPREUVES.find(e => e.key === session.atelierKey);
      if (!atelier.physical) return;
      const rotation = parseInt(btn.dataset.rotation, 10);
      if (isNaN(rotation)) return;
      const pairs = getAtelierScheduleForAllRotations(atelier.key);
      const teamIds = pairs[rotation - 1];
      if (!teamIds || teamIds.length !== 2) return;

      const phys = btn.dataset.phys; // 'foot' or 'volley'
      const outcome = btn.dataset.physOutcome;

      if (!state.scoresPhysical) state.scoresPhysical = {};
      const keyA = `${teamIds[0]}-${rotation}`;
      const keyB = `${teamIds[1]}-${rotation}`;
      if (!state.scoresPhysical[keyA]) state.scoresPhysical[keyA] = { foot: null, volley: null };
      if (!state.scoresPhysical[keyB]) state.scoresPhysical[keyB] = { foot: null, volley: null };

      let ptsA, ptsB;
      if (outcome === 'A') { ptsA = 2; ptsB = 0; }
      else if (outcome === 'B') { ptsA = 0; ptsB = 2; }
      else { ptsA = 1; ptsB = 1; }

      state.scoresPhysical[keyA][phys] = ptsA;
      state.scoresPhysical[keyB][phys] = ptsB;

      // Recompute the main /4 score for each team for the P atelier.
      // Each team visits P exactly once — that rotation becomes their P score.
      const scoresPatch = {};
      for (const tid of teamIds) {
        const k = `${tid}-${rotation}`;
        const p = state.scoresPhysical[k];
        const footPts = p.foot ?? 0;
        const volPts = p.volley ?? 0;
        const entry = { points: footPts + volPts, rotation };
        state.scores[`${tid}-P`] = entry;
        scoresPatch[`${tid}-P`] = entry;
      }

      await saveScores(scoresPatch, {
        [keyA]: state.scoresPhysical[keyA],
        [keyB]: state.scoresPhysical[keyB]
      });
      render();
    };
  });

  // Admin controls
  document.querySelectorAll('[data-action="start"]').forEach(btn => {
    btn.onclick = async () => {
      if (state.currentRotation === 0) state.currentRotation = 1;
      else state.currentRotation += 1;
      state.phase = 'epreuve';
      state.timerEnd = Date.now() + EPREUVE_DURATION * 1000;
      state.timerPaused = false;
      await saveStatePatch({ phase: state.phase, timerEnd: state.timerEnd, timerPaused: false, timerRemaining: null, currentRotation: state.currentRotation });
      render();
    };
  });
  document.querySelectorAll('[data-action="pause"]').forEach(btn => {
    btn.onclick = async () => {
      state.timerRemaining = getTimerRemaining();
      state.timerPaused = true;
      await saveStatePatch({ timerPaused: true, timerRemaining: state.timerRemaining });
      render();
    };
  });
  document.querySelectorAll('[data-action="resume"]').forEach(btn => {
    btn.onclick = async () => {
      state.timerEnd = Date.now() + (state.timerRemaining || 0) * 1000;
      state.timerPaused = false;
      state.timerRemaining = null;
      await saveStatePatch({ timerEnd: state.timerEnd, timerPaused: false, timerRemaining: null });
      render();
    };
  });
  document.querySelectorAll('[data-action="skip-phase"]').forEach(btn => {
    btn.onclick = async () => {
      const ok = await showConfirm(
        'Passer à la phase suivante',
        'Le minuteur va sauter immédiatement à la phase suivante. Confirmer ?',
        { confirmLabel: 'Passer' }
      );
      if (!ok) return;
      if (state.phase === 'epreuve') {
        state.phase = 'transition';
        state.timerEnd = Date.now() + TRANSITION_DURATION * 1000;
        state.timerPaused = false;
      } else if (state.phase === 'transition') {
        if (state.currentRotation < N_ROTATIONS) {
          state.currentRotation += 1;
          state.phase = 'epreuve';
          state.timerEnd = Date.now() + EPREUVE_DURATION * 1000;
          state.timerPaused = false;
        } else {
          state.currentRotation = N_ROTATIONS + 1;
          state.phase = 'idle';
          state.timerEnd = null;
        }
      }
      await saveStatePatch({ phase: state.phase, timerEnd: state.timerEnd, timerPaused: state.timerPaused, timerRemaining: null, currentRotation: state.currentRotation });
      render();
    };
  });
  document.querySelectorAll('[data-action="goto-rot"]').forEach(btn => {
    btn.onclick = async () => {
      const r = parseInt(btn.dataset.rot, 10);
      const ok = await showConfirm(
        `Aller à la rotation ${r}`,
        'Cela va relancer le minuteur à zéro sur cette rotation. Les scores déjà saisis sont conservés.',
        { confirmLabel: 'Y aller' }
      );
      if (!ok) return;
      state.currentRotation = r;
      state.phase = 'epreuve';
      state.timerEnd = Date.now() + EPREUVE_DURATION * 1000;
      state.timerPaused = false;
      await saveStatePatch({ phase: state.phase, timerEnd: state.timerEnd, timerPaused: false, timerRemaining: null, currentRotation: state.currentRotation });
      render();
    };
  });
  document.querySelectorAll('[data-action="show-podium"]').forEach(btn => {
    btn.onclick = () => showPodium();
  });

  document.querySelectorAll('[data-action="toggle-leaderboard"]').forEach(btn => {
    btn.onclick = async () => {
      state.leaderboardRevealed = !state.leaderboardRevealed;
      await saveStatePatch({ leaderboardRevealed: state.leaderboardRevealed });
      render();
      showToast(state.leaderboardRevealed ? 'Classement dévoilé !' : 'Classement masqué');
    };
  });

  document.querySelectorAll('[data-action="goto-screen"]').forEach(btn => {
    btn.onclick = async () => {
      const url = window.location.origin + window.location.pathname + '#/live';
      const w = window.open(url, '_blank');
      if (!w || w.closed || typeof w.closed === 'undefined') {
        try {
          await navigator.clipboard.writeText(url);
          showToast('URL du live copiée — collez-la dans un nouvel onglet');
        } catch {
          await showConfirm(
            'Ouvrir le live',
            `Copiez cette URL dans un nouvel onglet :\n\n${url}`,
            { confirmLabel: 'OK', cancelLabel: 'Fermer' }
          );
        }
      }
    };
  });
  document.querySelectorAll('[data-action="reset-all"]').forEach(btn => {
    btn.onclick = async () => {
      const ok = await showConfirm(
        'Tout réinitialiser',
        'Toutes les données (scores, rotation en cours, minuteur) vont être effacées. Les noms et codes d\'équipes sont conservés. Cette action est irréversible.',
        { danger: true, confirmLabel: 'Effacer tout' }
      );
      if (!ok) return;
      state.currentRotation = 0;
      state.phase = 'idle';
      state.timerEnd = null;
      state.timerPaused = false;
      state.timerRemaining = null;
      state.scores = {};
      state.scoresPhysical = {};
      await saveState();
      render();
      showToast('Challenge réinitialisé');
    };
  });
  document.querySelectorAll('[data-action="reset-challenge"]').forEach(btn => {
    btn.onclick = async () => {
      const ok = await showConfirm(
        'Redémarrer le challenge',
        'Les scores seront effacés. Confirmer ?',
        { confirmLabel: 'Redémarrer' }
      );
      if (!ok) return;
      state.currentRotation = 0;
      state.phase = 'idle';
      state.timerEnd = null;
      state.timerPaused = false;
      state.scores = {};
      state.scoresPhysical = {};
      await saveState();
      render();
    };
  });

  document.querySelectorAll('[data-action="reset-teams"]').forEach(btn => {
    btn.onclick = async () => {
      const ok = await showConfirm(
        'Réinitialiser',
        'Le nombre de participantes et tous les prénoms des capitaines vont être effacés. Continuer ?',
        { danger: true, confirmLabel: 'Effacer' }
      );
      if (!ok) return;
      state.participantCount = null;
      state.config.teams.forEach(t => { t.captain = ''; });
      await saveStatePatch({ participantCount: null, config: state.config });
      render();
      showToast('Calcul et capitaines réinitialisés');
    };
  });

  // Config editors
  document.querySelectorAll('[data-config="team-name"]').forEach(inp => {
    inp.onblur = async () => {
      const idx = parseInt(inp.dataset.idx, 10);
      state.config.teams[idx].name = inp.value.trim() || `Équipe ${idx+1}`;
      await saveStatePatch({ config: state.config });
    };
  });
  document.querySelectorAll('[data-config="team-code"]').forEach(inp => {
    inp.onblur = async () => {
      const idx = parseInt(inp.dataset.idx, 10);
      state.config.teams[idx].code = inp.value.trim();
      await saveStatePatch({ config: state.config });
    };
  });

  // Briefing carousel navigation
  document.querySelectorAll('[data-brief-action]').forEach(btn => {
    btn.onclick = () => {
      const action = btn.dataset.briefAction;
      if (action === 'next' && briefingSlide < BRIEFING_SLIDES.length - 1) {
        briefingSlide++;
        render();
      } else if (action === 'prev' && briefingSlide > 0) {
        briefingSlide--;
        render();
      } else if (action === 'live') {
        location.hash = '#/live';
      }
    };
  });
  document.querySelectorAll('[data-brief-go]').forEach(btn => {
    btn.onclick = () => {
      briefingSlide = parseInt(btn.dataset.briefGo, 10);
      render();
    };
  });

  // Teams calculator on briefing slide 5
  const teamsCalcInput = document.getElementById('teams-calc-input');
  if (teamsCalcInput) {
    teamsCalcInput.oninput = async () => {
      const v = parseInt(teamsCalcInput.value, 10);
      state.participantCount = isNaN(v) ? null : v;
      // Update the result block without full re-render (to preserve focus)
      const resultEl = document.getElementById('teams-calc-result');
      if (resultEl) {
        resultEl.innerHTML = renderTeamsCalcResult(state.participantCount);
      }
      await saveStatePatch({ participantCount: state.participantCount });
    };
  }

  // Captain name inputs on briefing slide 5
  document.querySelectorAll('[data-captain-idx]').forEach(inp => {
    // Save on blur (when user tabs out / clicks away) to avoid saving on every keystroke
    inp.onblur = async () => {
      const idx = parseInt(inp.dataset.captainIdx, 10);
      const newVal = inp.value.trim();
      const oldVal = state.config.teams[idx].captain || '';
      if (newVal === oldVal) return;
      state.config.teams[idx].captain = newVal;
      await saveStatePatch({ config: state.config });
      // Toggle visual "filled" state without full re-render
      const card = inp.closest('.brief-captain-card');
      if (card) card.classList.toggle('filled', !!newVal);
    };
    // Also save on Enter key
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') inp.blur();
    };
  });
}

// Keyboard arrows for briefing carousel (global listener, once)
if (!window._capeoKeyboardAttached) {
  window._capeoKeyboardAttached = true;
  document.addEventListener('keydown', (e) => {
    if (getRoute() !== 'screen') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' && briefingSlide < BRIEFING_SLIDES.length - 1) {
      briefingSlide++;
      render();
    } else if (e.key === 'ArrowLeft' && briefingSlide > 0) {
      briefingSlide--;
      render();
    }
  });
}

// ============================================================
// UTIL
// ============================================================
function escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

// ============================================================
// INIT
// ============================================================
(async () => {
  await loadState();
  render();
})();
</script>
</body>
</html>
