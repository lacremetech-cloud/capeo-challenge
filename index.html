<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Challenge CAPEO</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4efe6;
    --bg-soft: #ebe3d5;
    --ink: #1a2a1f;
    --ink-soft: #3d4a3f;
    --muted: #7a7265;
    --card: #faf6ed;
    --accent: #1f4a38;
    --accent-soft: #3a6b55;
    --terracotta: #b85c38;
    --gold: #c4963c;
    --line: #d7ccb9;
    --danger: #a8321e;
    --shadow: 0 1px 2px rgba(26, 42, 31, 0.04), 0 8px 24px rgba(26, 42, 31, 0.06);
    --shadow-lg: 0 1px 2px rgba(26, 42, 31, 0.04), 0 24px 64px rgba(26, 42, 31, 0.12);
    --radius: 18px;
    --radius-sm: 10px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter Tight', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 10%, rgba(31, 74, 56, 0.04) 0%, transparent 40%),
                      radial-gradient(circle at 80% 90%, rgba(184, 92, 56, 0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }
  input, select {
    font-family: inherit;
    color: inherit;
  }

  /* ============ ROOT LAYOUT ============ */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ============ ROLE SWITCHER (subtle, top-right) ============ */
  .role-bar {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    display: flex;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .role-bar button {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    border-radius: 999px;
    transition: all 0.2s ease;
  }
  .role-bar button:hover { color: var(--ink); }
  .role-bar button.active {
    background: var(--accent);
    color: var(--card);
  }

  /* ============ SCREEN: LANDING ============ */
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .landing-ornament {
    width: 80px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 32px;
    position: relative;
  }
  .landing-ornament::before, .landing-ornament::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    transform: translateY(-50%);
  }
  .landing-ornament::before { left: -16px; }
  .landing-ornament::after { right: -16px; }
  .landing-kicker {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .landing h1 {
    font-family: var(--font-display);
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .landing h1 em {
    font-style: italic;
    color: var(--terracotta);
    font-variation-settings: 'opsz' 144;
  }
  .landing-sub {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 520px;
    margin: 0 auto 48px;
    line-height: 1.6;
  }
  .role-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    max-width: 800px;
    width: 100%;
  }
  .role-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align: left;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
  }
  .role-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--accent);
  }
  .role-card-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    font-style: italic;
  }
  .role-card-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .role-card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ============ PROJECTION SCREEN ============ */
  .screen {
    min-height: 100vh;
    padding: 48px 64px;
    display: flex;
    flex-direction: column;
  }
  .screen-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }
  .screen-title-block .kicker {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .screen-title-block h1 {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent);
  }
  .screen-title-block h1 em {
    font-style: italic;
    color: var(--terracotta);
  }
  .timer-block {
    text-align: right;
  }
  .timer-phase {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .timer-phase.active-epreuve { color: var(--accent); }
  .timer-phase.active-transition { color: var(--terracotta); }
  .timer-display {
    font-family: var(--font-display);
    font-size: 88px;
    font-weight: 400;
    font-variation-settings: 'opsz' 144, 'wght' 400;
    line-height: 1;
    letter-spacing: -0.04em;
    font-feature-settings: 'tnum' 1;
    color: var(--ink);
  }
  .timer-display.paused { color: var(--muted); }
  @keyframes timerAlert {
    0%, 100% { color: var(--danger); opacity: 1; }
    50%       { color: var(--danger); opacity: 0.25; }
  }
  .timer-display.alert { animation: timerAlert 1s ease-in-out infinite; }

  .rotation-indicator {
    display: flex;
    gap: 8px;
    margin: 24px 0 40px;
    align-items: center;
  }
  .rotation-dot {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.3s ease;
  }
  .rotation-dot.done {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: var(--card);
  }
  .rotation-dot.current {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--card);
    transform: scale(1.15);
    box-shadow: 0 0 0 4px rgba(31, 74, 56, 0.15);
  }
  .rotation-line {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .screen-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    flex: 1;
  }
  .section-label {
    font-family: var(--font-display);
    font-size: 14px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 400;
  }

  .ateliers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .atelier-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .atelier-card.highlight {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--card);
  }
  .atelier-card.highlight .atelier-letter { color: var(--gold); }
  .atelier-card.highlight .atelier-teams-label { color: rgba(250, 246, 237, 0.6); }
  .atelier-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
  }
  .atelier-letter {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    font-style: italic;
    color: var(--terracotta);
    line-height: 0.9;
  }
  .atelier-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .atelier-teams-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .atelier-teams {
    font-size: 14px;
    font-weight: 500;
  }
  .atelier-teams-empty {
    font-size: 14px;
    font-style: italic;
    opacity: 0.5;
  }

  .leaderboard {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
  }
  .leaderboard-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .leaderboard-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-rank {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    color: var(--muted);
    font-weight: 500;
  }
  .leaderboard-row.top-1 .leaderboard-rank { color: var(--gold); font-size: 22px; }
  .leaderboard-row.top-2 .leaderboard-rank { color: var(--terracotta); }
  .leaderboard-row.top-3 .leaderboard-rank { color: var(--accent-soft); }
  .leaderboard-name {
    font-size: 15px;
    font-weight: 500;
  }
  .leaderboard-score {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    font-feature-settings: 'tnum' 1;
  }
  .leaderboard-list.blurred { filter: blur(8px); user-select: none; pointer-events: none; transition: filter 0.6s ease; }
  .leaderboard-list.blurred:hover { filter: blur(8px); }
  .leaderboard-reveal-hint { text-align:center; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-top:10px; }
  .leaderboard-score-max {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ============ PODIUM OVERLAY ============ */
  .section-label-btn {
    background: none; border: none; padding: 0;
    font: inherit; color: inherit; letter-spacing: inherit;
    text-transform: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label-btn::after { content: '🏆'; font-size: 14px; opacity: 0.5; transition: opacity 0.2s; }
  .section-label-btn:hover::after { opacity: 1; }

  .podium-overlay {
    position: fixed; inset: 0;
    background: rgba(26,42,31,0.88);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #podium-confetti {
    position: fixed; inset: 0; pointer-events: none; z-index: 199;
  }
  .podium-content {
    background: var(--card); border-radius: var(--radius);
    padding: 40px 32px 32px; max-width: 500px; width: 100%;
    text-align: center; position: relative; z-index: 201;
    animation: podiumEnter 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes podiumEnter {
    from { transform: scale(0.4) translateY(60px); opacity: 0; }
    to   { transform: scale(1) translateY(0);      opacity: 1; }
  }
  .podium-congrats {
    font-family: var(--font-display); font-size: 38px; font-weight: 700;
    color: var(--accent); line-height: 1; margin-bottom: 4px;
  }
  .podium-sub {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 36px;
  }
  .podium-stage {
    display: flex; align-items: flex-end; justify-content: center; gap: 6px; margin-bottom: 32px;
  }
  .podium-step { display: flex; flex-direction: column; align-items: center; width: 140px; }
  .podium-medal { font-size: 26px; margin-bottom: 4px; }
  .podium-name {
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    color: var(--ink); margin-bottom: 4px; text-align: center; line-height: 1.2;
  }
  .podium-pts { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .podium-bar {
    width: 100%; border-radius: 8px 8px 0 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 32px; font-weight: 700; color: white;
  }
  .podium-step.p1 .podium-bar { height: 130px; background: var(--gold); }
  .podium-step.p2 .podium-bar { height: 90px;  background: var(--ink-soft); }
  .podium-step.p3 .podium-bar { height: 65px;  background: var(--terracotta); }
  .podium-step.p1 { animation: podiumRise 0.5s 0.3s cubic-bezier(0.34,1.4,0.64,1) both; }
  .podium-step.p2 { animation: podiumRise 0.5s 0.5s cubic-bezier(0.34,1.4,0.64,1) both; }
  .podium-step.p3 { animation: podiumRise 0.5s 0.7s cubic-bezier(0.34,1.4,0.64,1) both; }
  @keyframes podiumRise { from { transform: translateY(40px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .podium-close {
    background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
    padding: 12px 36px; font-family: var(--font-body); font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
  }
  .podium-close:hover { background: var(--ink); }

  /* ============ QR CODE SECTION (on screen) ============ */
  .screen-footer {
    margin-top: 32px;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .screen-footer-text {
    flex: 1;
  }
  .screen-footer-text .kicker {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .screen-footer-text .url {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    color: var(--accent);
    word-break: break-all;
  }
  .qr-box {
    width: 100px;
    height: 100px;
    background: #fff;
    border-radius: 8px;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .qr-box img { width: 100%; height: 100%; }

  /* ============ MOBILE VIEWS (capitaine, responsable) ============ */
  .mobile-view {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 120px;
    min-height: 100vh;
  }
  .mobile-header {
    margin-bottom: 32px;
    padding-top: 20px;
  }
  .mobile-header .kicker {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .mobile-header h1 {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--accent);
  }
  .mobile-header h1 em { font-style: italic; color: var(--terracotta); }

  /* Login card */
  .login-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
  }
  .login-card .form-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
    font-weight: 500;
  }
  .login-card select,
  .login-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 16px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .login-card select:focus,
  .login-card input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .login-card .submit-btn {
    width: 100%;
    background: var(--accent);
    color: var(--card);
    padding: 16px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background 0.2s;
  }
  .login-card .submit-btn:hover { background: var(--ink); }
  .login-card .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: -12px;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Capitaine dashboard */
  .cap-status {
    background: var(--accent);
    color: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .cap-status::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 120px;
    height: 120px;
    background: rgba(196, 150, 60, 0.15);
    border-radius: 50%;
  }
  .cap-status .kicker {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    font-weight: 500;
    position: relative;
  }
  .cap-status-letter {
    font-family: var(--font-display);
    font-size: 96px;
    font-variation-settings: 'opsz' 144;
    font-style: italic;
    color: var(--gold);
    line-height: 0.85;
    position: relative;
  }
  .cap-status-name {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-top: 4px;
    position: relative;
  }
  .cap-status-timer {
    position: relative;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(250, 246, 237, 0.2);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .cap-status-timer-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(250, 246, 237, 0.7);
  }
  .cap-status-timer-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    font-feature-settings: 'tnum' 1;
    color: var(--gold);
  }

  .cap-next, .cap-scores {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .cap-next .kicker, .cap-scores .kicker {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .cap-next-content {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .cap-next-letter {
    font-family: var(--font-display);
    font-size: 48px;
    font-style: italic;
    color: var(--terracotta);
    font-variation-settings: 'opsz' 144;
    line-height: 0.9;
  }
  .cap-next-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .cap-brief {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .cap-brief .kicker {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .cap-brief-title {
    font-family: var(--font-display);
    font-size: 24px;

  .cap-status-responsible {

    font-family: var(--font-body);

  .cap-status-responsible-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(250, 246, 237, 0.6);

  .cap-status-responsible-value {
    font-size: 14px;
    font-style: italic;
    color: rgba(250, 246, 237, 0.85);

  .cap-next-info {

    flex-direction: column;

  }
  .cap-next-location {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    font-family: var(--font-body);
  }
  .cap-next-responsible {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-body);

  }
  .cap-score-value {

    font-weight: 500;

  }
  .cap-score-pending {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .cap-total {

    text-transform: uppercase;

  .resp-timer-value {

  .resp-teams-section h3 {

    font-size: 16px;
    font-weight: 500;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .resp-no-teams {
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
  }

  .resp-outcome-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .resp-outcome-btn {

  .resp-outcome-btn.tie {

  }
  .resp-outcome-btn.lose {

  }

  }

  .resp-team-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  /* Free-form rotation table */
  .resp-free-hint {
    background: var(--bg-soft);
    border-left: 3px solid var(--gold);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 16px;
    font-style: italic;

  }
  .resp-rotations {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .resp-rotation-row {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--bg);
    overflow: hidden;
    transition: all 0.2s;
  }
  .resp-rotation-row.current {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(31, 74, 56, 0.08);
  }
  .resp-rotation-row.done {
    background: var(--card);
  }
  .resp-rotation-row.expanded {
    background: var(--card);
  }
  .resp-rotation-head {
    width: 100%;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: transparent;
    text-align: left;
    transition: background 0.15s;
  }
  .resp-rotation-head:hover {
    background: var(--bg-soft);
  }
  .resp-rotation-row.expanded .resp-rotation-head {
    background: transparent;
  }
  .resp-rotation-num {
    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 4px 10px;
    background: var(--bg-soft);
    border-radius: 8px;
    min-width: 54px;

    background: var(--accent);
  }
  .resp-rotation-num-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .resp-rotation-row.current .resp-rotation-num-label {
    color: rgba(250, 246, 237, 0.7);
  }
  .resp-rotation-num-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    color: var(--ink);
  }
  .resp-rotation-row.current .resp-rotation-num-value {
    color: var(--gold);
  }
  .resp-rotation-teams {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;

  .resp-rotation-team-a, .resp-rotation-team-b {

  .resp-rotation-vs {
    font-size: 10px;
    font-style: italic;
    color: var(--muted);
    font-family: var(--font-display);
    letter-spacing: 0.05em;
  }
  .resp-rotation-status {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .resp-rotation-badge-live {
    background: var(--accent);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .resp-rotation-score {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    font-feature-settings: 'tnum' 1;
  }
  .resp-rotation-pending {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .resp-rotation-chevron {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .resp-rotation-body {
    padding: 8px 14px 18px;
    border-top: 1px solid var(--line);
    background: var(--bg);
    animation: rowExpand 0.2s ease-out;
  }
  @keyframes rowExpand {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .resp-physical-notice {
    background: var(--bg-soft);
    border-left: 3px solid var(--gold);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    font-style: italic;
  }
  .resp-sub-section {
    margin-bottom: 20px;
  }
  .resp-sub-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .resp-submit {
    width: 100%;
    background: var(--accent);
    color: var(--card);
    padding: 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 12px;
    transition: background 0.2s;
  }
  .resp-submit:hover { background: var(--ink); }
  .resp-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--muted);
  }
  .resp-submitted {
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 12px;
  }
  .resp-submitted::before {
    content: '✓ ';
    font-weight: 700;
  }

  /* ============ ADMIN VIEW ============ */
  .admin-view {
    max-width: 1200px;

    padding: 40px 32px 80px;
  }
  .admin-header {
    display: flex;

    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }
  .admin-header h1 {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .admin-header h1 em { font-style: italic; color: var(--terracotta); }

  .admin-controls {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

  }
  .admin-btn {
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);

  }
  .admin-btn:hover { background: var(--bg-soft); border-color: var(--accent); }
  .admin-btn.primary {
    background: var(--accent);

  }
  .admin-btn.primary:hover { background: var(--ink); }
  .admin-btn.danger { color: var(--danger); }
  .admin-btn.danger:hover { background: #fbe9e5; border-color: var(--danger); }

  .admin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .admin-section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
  }
  .admin-section h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 16px;

  .admin-state-info {
    display: flex;

    gap: 10px;

  .admin-state-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .admin-state-row:last-child { border-bottom: none; }
  .admin-state-label {
    font-size: 13px;
    color: var(--muted);
  }
  .admin-state-value {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
  }

  .admin-timer {
    text-align: center;
    padding: 20px;
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .admin-timer-value {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 500;
    font-feature-settings: 'tnum' 1;
    color: var(--accent);
    letter-spacing: -0.02em;

  .admin-timer-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;

  .admin-scores-table td.total {

    font-weight: 500;
    font-size: 16px;

  .admin-scores-table td.letter {
    font-family: var(--font-display);
    text-align: center;
    color: var(--accent);
    font-feature-settings: 'tnum' 1;
  }
  .admin-scores-table td.empty {
    text-align: center;
    color: var(--line);
  }

  .setup-hint {
    background: var(--bg-soft);
    border-left: 3px solid var(--gold);

    border-radius: 6px;
    font-size: 13px;

    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .admin-config-col h3 {
    font-family: var(--font-display);
    font-size: 16px;
    font-style: italic;
    color: var(--muted);

    margin-bottom: 10px;

  /* ============ CONFIRM MODAL ============ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 42, 31, 0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease-out;
  }
  .modal-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 440px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
  }
  .modal-card h3 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .modal-card p {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .modal-btn {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .modal-btn.cancel {
    background: var(--bg-soft);
    color: var(--ink-soft);
  }
  .modal-btn.cancel:hover { background: var(--line); }
  .modal-btn.confirm {
    background: var(--accent);
    color: var(--card);
  }
  .modal-btn.confirm:hover { background: var(--ink); }
  .modal-btn.confirm.danger { background: var(--danger); }
  .modal-btn.confirm.danger:hover { background: #8e2816; }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--card);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 1001;
    animation: toastIn 0.3s ease-out;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ============ BRIEFING CAROUSEL ============ */
  .brief {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 40px 48px 80px;
  }
  .brief-nav {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    padding: 10px 18px;
    border-radius: 999px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .brief-nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
  }
  .brief-nav-btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--card);
  }
  .brief-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .brief-nav-dots {
    display: flex;
    gap: 6px;
  }
  .brief-nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
    transition: all 0.2s;
    cursor: pointer;
    border: none;
    padding: 0;
  }
  .brief-nav-dot.active {
    background: var(--accent);
    width: 24px;
    border-radius: 999px;
  }
  .brief-nav-live {
    background: var(--accent);
    color: var(--card);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.2s;
    margin-left: 8px;
  }
  .brief-nav-live:hover { background: var(--ink); }

  .brief-slide {
    flex: 1;
    display: flex;
    flex-direction: column;
    animation: slideFade 0.4s ease-out;
  }
  @keyframes slideFade {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .brief-kicker {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .brief-title {
    font-family: var(--font-display);
    font-size: clamp(56px, 8vw, 96px);
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: var(--accent);
    margin-bottom: 24px;
  }
  .brief-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .brief-lead {
    font-family: var(--font-display);
    font-size: clamp(20px, 2.5vw, 28px);
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
    line-height: 1.4;
    max-width: 880px;
    margin-bottom: 40px;
  }

  /* Slide 1: Bienvenue (centered, no QR) */
  .brief-welcome-centered {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .brief-welcome-title {
    font-family: var(--font-display);
    font-size: clamp(72px, 12vw, 140px);
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 32px;
  }
  .brief-welcome-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .brief-welcome-sub {
    font-family: var(--font-display);
    font-size: clamp(20px, 2.8vw, 30px);
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
    max-width: 720px;
    line-height: 1.4;
  }

  /* Slide 1: Bienvenue */
  .brief-welcome {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 48px;
    align-items: center;
    flex: 1;
  }
  .brief-welcome-right {
    text-align: center;
    padding: 32px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
  }
  .brief-qr {
    width: 260px;
    height: 260px;
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin: 0 auto 20px;
  }
  .brief-qr img { width: 100%; height: 100%; }
  .brief-qr-label {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    font-style: italic;
    margin-bottom: 6px;
    color: var(--accent);
  }
  .brief-qr-url {
    font-size: 13px;
    color: var(--muted);
    word-break: break-all;
  }

  /* Slide 2: Concept — stat numbers (3 stats version) */
  .brief-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-top: 32px;
  }
  .brief-stats.brief-stats-3 {
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    max-width: 900px;
  }
  .brief-stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 32px;
    text-align: center;
  }
  .brief-stat-num {
    font-family: var(--font-display);
    font-size: clamp(72px, 10vw, 120px);
    font-variation-settings: 'opsz' 144;
    font-weight: 400;
    line-height: 0.9;
    color: var(--accent);
    letter-spacing: -0.04em;
  }
  .brief-stat-num em {
    font-style: italic;
    color: var(--terracotta);
  }
  .brief-stat-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 12px;
    font-weight: 500;
    line-height: 1.4;
  }

  /* Slide 4: Atelier fonctionnement */
  .brief-atelier-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 24px;
  }
  .brief-atelier-step {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 24px;
    position: relative;
  }
  .brief-atelier-step-num {
    font-family: var(--font-display);
    font-size: 56px;
    font-style: italic;
    color: var(--terracotta);
    line-height: 0.9;
    margin-bottom: 12px;
    font-variation-settings: 'opsz' 144;
  }
  .brief-atelier-step-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .brief-atelier-step-desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .brief-atelier-footer {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 24px;
    background: var(--accent);
    color: var(--card);
    padding: 24px 28px;
    border-radius: var(--radius);
  }
  .brief-atelier-footer-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .brief-atelier-footer-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(250, 246, 237, 0.7);
    font-weight: 500;
  }
  .brief-atelier-footer-value {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 500;
    color: var(--gold);
    line-height: 1;
    font-variation-settings: 'opsz' 144;
  }
  .brief-atelier-footer-value em {
    font-style: italic;
  }

  /* Slide 5: Teams calculator */
  .brief-teams-calc {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 32px;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px;
    margin-top: 24px;
  }
  .brief-teams-calc-left {
    text-align: left;
  }
  .brief-teams-calc-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .brief-teams-calc-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--line);
    font-family: var(--font-display);
    font-size: clamp(48px, 7vw, 80px);
    font-weight: 400;
    color: var(--accent);
    padding: 8px 0;
    font-variation-settings: 'opsz' 144;
    font-feature-settings: 'tnum' 1;
    transition: border-color 0.2s;
  }
  .brief-teams-calc-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }
  .brief-teams-calc-input::placeholder {
    color: var(--line);
    font-style: italic;
  }
  .brief-teams-calc-hint {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-top: 8px;
  }
  .brief-teams-calc-arrow {
    font-family: var(--font-display);
    font-size: 48px;
    color: var(--terracotta);
    font-style: italic;
  }
  .brief-teams-calc-right {
    text-align: left;
  }
  .brief-teams-calc-empty {
    color: var(--muted);
  }
  .brief-teams-calc-empty-label {
    font-family: var(--font-display);
    font-size: 24px;
    font-style: italic;
    margin-bottom: 6px;
  }
  .brief-teams-calc-empty-hint {
    font-size: 13px;
  }
  .brief-teams-calc-result-num {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    font-variation-settings: 'opsz' 144;
  }
  .brief-teams-calc-result-eq {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--muted);
    font-style: italic;
    margin: 6px 0 12px;
  }
  .brief-teams-calc-result-text {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .brief-teams-calc-result-text strong {
    font-family: var(--font-display);
    font-weight: 500;
    color: var(--accent);
    font-size: 18px;
  }
  .brief-teams-hint {
    margin-top: 24px;
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.6;
    text-align: center;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Captains grid on teams slide */
  .brief-captains-section {
    margin-top: 32px;
  }
  .brief-captains-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    gap: 24px;
    flex-wrap: wrap;
  }
  .brief-captains-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    font-style: italic;
    color: var(--terracotta);
  }
  .brief-captains-hint {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .brief-captains-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .brief-captain-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 14px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: all 0.2s;
  }
  .brief-captain-card.filled {
    background: var(--accent);
    border-color: var(--accent);
  }
  .brief-captain-card.filled .brief-captain-num { color: var(--gold); }
  .brief-captain-card.filled .brief-captain-input {
    color: var(--card);
    border-bottom-color: rgba(196, 150, 60, 0.4);
  }
  .brief-captain-card.filled .brief-captain-input::placeholder {
    color: rgba(250, 246, 237, 0.5);
  }
  .brief-captain-num {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .brief-captain-num::before { content: 'Équipe '; }
  .brief-captain-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 4px 0;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    width: 100%;
    transition: border-color 0.2s;
  }
  .brief-captain-input:focus {
    outline: none;
    border-bottom-color: var(--terracotta);
  }
  .brief-captain-input::placeholder {
    font-style: italic;
    color: var(--muted);
    font-weight: 400;
    font-size: 14px;
  }

  /* Slide 6: Webapp access */
  .brief-webapp {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 48px;
    align-items: center;
    margin-top: 24px;
  }
  .brief-webapp-qr-block {
    text-align: center;
  }
  .brief-webapp-qr {
    width: 300px;
    height: 300px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .brief-webapp-qr img { width: 100%; height: 100%; }
  .brief-webapp-qr-label {
    font-size: 13px;
    color: var(--muted);
    word-break: break-all;
    max-width: 300px;
    margin: 0 auto;
  }
  .brief-webapp-roles {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .brief-webapp-role {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 20px;
    align-items: center;
  }
  .brief-webapp-role-letter {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 28px;
    font-style: italic;
    font-variation-settings: 'opsz' 144;
  }
  .brief-webapp-role-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .brief-webapp-role-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* Slide 3: Les 5 épreuves detailed */
  .brief-epreuves {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-top: 24px;
  }
  .brief-epreuve {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .brief-epreuve:hover {
    box-shadow: var(--shadow);
    transform: translateY(-2px);
    transition: all 0.2s;
  }
  .brief-epreuve-letter {
    font-family: var(--font-display);
    font-size: 72px;
    font-variation-settings: 'opsz' 144;
    font-style: italic;
    color: var(--terracotta);
    line-height: 0.85;
  }
  .brief-epreuve-name {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .brief-epreuve-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    flex: 1;
  }
  .brief-epreuve-pts {
    font-family: var(--font-display);
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .brief-epreuve-resp {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  /* Slide 4: Points system */
  .brief-points-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 24px;
  }
  .brief-points-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px;
  }
  .brief-points-card h3 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  .brief-points-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .brief-points-row:last-child { border-bottom: none; }
  .brief-points-label {
    font-size: 15px;
    color: var(--ink-soft);
  }
  .brief-points-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
  }
  .brief-points-value em {
    font-style: italic;
    color: var(--terracotta);
  }
  .brief-points-note {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .brief-points-total {
    background: var(--accent);
    color: var(--card);
    padding: 24px;
    border-radius: var(--radius);
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .brief-points-total-label {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .brief-points-total-value {
    font-family: var(--font-display);
    font-size: 56px;
    font-variation-settings: 'opsz' 144;
    font-weight: 400;
    color: var(--gold);
  }

  /* Slide 5: Organisation */
  .brief-org {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 32px;
  }
  .brief-org-col {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px;
  }
  .brief-org-col h3 {
    font-family: var(--font-display);
    font-size: 24px;
    font-style: italic;
    font-weight: 400;
    color: var(--terracotta);
    margin-bottom: 20px;
  }
  .brief-org-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 16px;
    margin-bottom: 20px;
    align-items: flex-start;
  }
  .brief-org-item:last-child { margin-bottom: 0; }
  .brief-org-num {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    font-feature-settings: 'tnum' 1;
  }
  .brief-org-item-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .brief-org-item-desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* Slide 6: Go */
  .brief-go {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .brief-go h1 {
    font-family: var(--font-display);
    font-size: clamp(80px, 14vw, 180px);
    font-variation-settings: 'opsz' 144;
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
    line-height: 0.9;
    margin-bottom: 24px;
    letter-spacing: -0.04em;
  }
  .brief-go-sub {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--ink-soft);
    margin-bottom: 40px;
    max-width: 700px;
  }
  .brief-go-cta {
    background: var(--accent);
    color: var(--card);
    padding: 20px 40px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: var(--shadow-lg);
  }
  .brief-go-cta:hover {
    background: var(--ink);
    transform: translateY(-2px);
  }

  /* Mode live (ex-screen) — now called "live" */
  .live-toggle-back {
    position: fixed;
    top: 72px;
    right: 16px;
    z-index: 50;
    background: var(--card);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .live-toggle-back:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  @media (max-width: 900px) {
    .brief { padding: 24px 20px 100px; }
    .brief-welcome { grid-template-columns: 1fr; gap: 24px; }
    .brief-stats { grid-template-columns: 1fr 1fr; gap: 12px; }

<body>

<div class="app" id="app"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const EPREUVES = [
  { key: 'C', name: 'Culture',      maxPts: 2, physical: false, location: 'Grande salle du haut', responsible: 'Ansa Soumiya' },
  { key: 'A', name: 'Artistique',   maxPts: 2, physical: false, location: 'Le porche',             responsible: 'Ansa Leila' },
  { key: 'P', name: 'Physique',     maxPts: 4, physical: true,  location: 'Terrains de sport',     responsible: 'Kawthar Abdelwafi' },
  { key: 'E', name: 'Éloquence',    maxPts: 2, physical: false, location: 'Réfectoire',            responsible: 'Ansa Cheyma' },
  { key: 'O', name: 'Organisation', maxPts: 2, physical: false, location: 'Réfectoire',            responsible: 'Ansa Dounia' },
];
const N_TEAMS = 10;
const N_ROTATIONS = 5;
const EPREUVE_DURATION = 25 * 60; // 25 min in seconds
const TRANSITION_DURATION = 5 * 60; // 5 min
const ADMIN_CODE = 'ADMIN2026'; // ← change this code to whatever you want

// Rotation schedule: teams[rotation][atelierIndex] = [teamIdxA, teamIdxB]
// Designed so each team visits each atelier exactly once across 5 rotations.
// Pairs rotate so teams face different opponents.
function buildSchedule() {
  // 10 teams, 5 ateliers, 2 teams per atelier, 5 rotations
  // Round-robin style: teams 0-9, paired (0,5), (1,6), (2,7), (3,8), (4,9) for rotation 1
  // Then shift ateliers.
  const schedule = [];
  const pairings = [
    [[0,5], [1,6], [2,7], [3,8], [4,9]],
    [[0,6], [1,7], [2,8], [3,9], [4,5]],
    [[0,7], [1,8], [2,9], [3,5], [4,6]],
    [[0,8], [1,9], [2,5], [3,6], [4,7]],
    [[0,9], [1,5], [2,6], [3,7], [4,8]],
  ];
  for (let r = 0; r < N_ROTATIONS; r++) {
    const rotation = [];
    for (let a = 0; a < EPREUVES.length; a++) {
      // Each pair goes to a different atelier; shift by rotation to ensure variety
      const pairIdx = (a + r) % pairings[r].length;
      rotation.push(pairings[r][pairIdx]);
    }
    schedule.push(rotation);
  }
  return schedule;
}
const SCHEDULE = buildSchedule();

// ============================================================
// STATE (persisted via window.storage, shared: true)
// ============================================================
const DEFAULT_CONFIG = {
  teams: Array.from({length: N_TEAMS}, (_, i) => ({
    id: i,
    name: `Équipe ${i+1}`,
    captain: '', // nom de la capitaine (saisi le jour J)
    code: String(1000 + i * 111).slice(-4) // simple codes: 1000, 1111, ... 2000 etc.
  })),
  ateliers: EPREUVES.map(e => ({...e}))
};

// Computes the display name of a team: "Équipe N · Capitaine" if captain is set.
function teamDisplayName(team) {
  if (!team) return '';
  if (team.captain && team.captain.trim()) {
    return `${team.name} · ${team.captain.trim()}`;
  }
  return team.name;
}

// Short version for compact UI (buttons, small labels)
function teamShortName(team) {
  if (!team) return '';
  if (team.captain && team.captain.trim()) {
    return team.captain.trim();
  }
  return team.name.replace('Équipe ', 'Éq. ');
}

// In-memory mirror of persistent state
let state = {
  currentRotation: 0,   // 0 = not started, 1-5 = active, 6 = finished
  phase: 'idle',        // 'idle' | 'epreuve' | 'transition'
  timerEnd: null,       // epoch ms when current phase ends
  timerPaused: false,
  timerRemaining: null, // used when paused
  scores: {},           // "teamId-atelierKey": { points: number, rotation: number }
  participantCount: null, // total participants present (for team calc)
  leaderboardRevealed: false, // true = classement visible sur #/live
  config: DEFAULT_CONFIG
};

// ============================================================
// STORAGE — Supabase (primary) + localStorage (fallback)
// Strategy: use Supabase Realtime for multi-device sync when
// credentials are configured, fall back to localStorage polling.
// Never crash, never show errors — the event must keep running.
// ============================================================
const STORAGE_KEY = 'capeo:state'; // localStorage fallback key
let storageMode = 'local'; // 'supabase' | 'local'

// Initialize Supabase client if credentials are provided via config.js
const _supabase = (window.CAPEO_SUPABASE_URL && window.CAPEO_SUPABASE_ANON_KEY)
  ? window.supabase.createClient(window.CAPEO_SUPABASE_URL, window.CAPEO_SUPABASE_ANON_KEY)
  : null;

async function loadState() {
  if (_supabase) {
    try {
      const { data, error } = await _supabase
        .from('event_state')
        .select('data')
        .eq('id', 1)
        .maybeSingle();
      if (!error && data && data.data) {
        state = { ...state, ...data.data };
        if (!state.config) state.config = DEFAULT_CONFIG;
      }
      storageMode = 'supabase';
      return;
    } catch(e) {
      console.warn('Supabase unavailable, falling back to localStorage', e);
    }
  }
  // localStorage fallback
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    if (v) {
      const parsed = JSON.parse(v);
      state = { ...state, ...parsed };
      if (!state.config) state.config = DEFAULT_CONFIG;
    }
  } catch(e) {}
  storageMode = 'local';
}

// Full-state overwrite — used only for intentional resets (scores = {}).
// For all other saves, use saveScores() or saveStatePatch() which never
// overwrite fields they don't own.
async function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (_supabase) {
    const { error } = await _supabase
      .from('event_state')
      .upsert({ id: 1, data: state, updated_at: new Date().toISOString() });
    storageMode = error ? 'local' : 'supabase';
    if (error) console.error('[saveState] upsert error:', error.message);
  }
}

// Atomic score save.
// Fast path: merge_scores RPC (requires migration — zero risk of clobbering).
// Fallback:  read current scores from Supabase, merge, then write back.
//            Slower (2 round-trips) but completely safe without any migration.
async function saveScores(scorePatch, physicalPatch = null) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (!_supabase) return;

  // Try RPC first
  const { error: rpcErr } = await _supabase.rpc('merge_scores', {
    p_scores: scorePatch,
    p_physical: physicalPatch
  });
  if (!rpcErr) { storageMode = 'supabase'; return; }

  // RPC not available — read current server state, merge our scores into it, write back.
  // This guarantees we never overwrite another device's score keys.
  const { data: current } = await _supabase
    .from('event_state').select('data').eq('id', 1).maybeSingle();
  const serverData = current?.data || {};
  const merged = {
    ...state,
    scores:         { ...(serverData.scores         || {}), ...(state.scores         || {}) },
    scoresPhysical: { ...(serverData.scoresPhysical || {}), ...(state.scoresPhysical || {}) },
  };
  const { error } = await _supabase
    .from('event_state')
    .upsert({ id: 1, data: merged, updated_at: new Date().toISOString() });
  storageMode = error ? 'local' : 'supabase';
}

// Targeted patch — updates only the provided top-level keys (timer, config, leaderboard…).
// Fast path: save_state_patch RPC.
// Fallback:  saveState() — safe here because saveStatePatch is only called by admin,
//            whose local state is always current (receives Realtime from all devices).
async function saveStatePatch(patch) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (!_supabase) return;

  const { error } = await _supabase.rpc('save_state_patch', { p_patch: patch });
  if (!error) { storageMode = 'supabase'; return; }

  // RPC not available — fall back to full save (admin-only caller, state is current)
  await saveState();
}

// Real-time sync: Supabase Realtime when configured, localStorage polling as fallback
if (_supabase) {
  _supabase
    .channel('capeo-state')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'event_state' }, (payload) => {
      if (!payload.new || !payload.new.data) return;
      const prevPhase = state.phase;
      state = { ...state, ...payload.new.data };
      if (!state.config) state.config = DEFAULT_CONFIG;
      // Play end alarm on non-admin devices when the admin transitions epreuve → transition
      if (prevPhase === 'epreuve' && state.phase === 'transition' && getRoute() !== 'admin') {
        playEndAlarm();
      }
      const active = document.activeElement;
      const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
      if (!isTyping) render();
    })
    .subscribe();
} else {
  // Fallback: poll localStorage every 3s (single-device mode)
  let lastStateHash = '';
  setInterval(() => {
    try {
      const v = localStorage.getItem(STORAGE_KEY);
      if (v && v !== lastStateHash) {
        lastStateHash = v;
        const parsed = JSON.parse(v);
        state = { ...state, ...parsed };
        if (!state.config) state.config = DEFAULT_CONFIG;
        const active = document.activeElement;
        const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
        if (!isTyping) render();
      }
    } catch(e) {}
  }, 3000);
}

// ============================================================
// ROUTING (hash-based: #/screen, #/cap, #/resp, #/admin)
// ============================================================
function getRoute() {
  const h = window.location.hash.slice(1) || '/';
  if (h.startsWith('/screen')) return 'screen';
  if (h.startsWith('/live'))   return 'live';
  if (h.startsWith('/cap'))    return 'cap';
  if (h.startsWith('/resp'))   return 'resp';
  if (h.startsWith('/admin'))  return 'admin';
  return 'screen';
}
window.addEventListener('hashchange', render);

// Local session (which team / atelier chosen on this device)
const SESSION_KEY_CAP = 'capeo:session:cap';
const SESSION_KEY_RESP = 'capeo:session:resp';
const SESSION_KEY_ADMIN = 'capeo:session:admin';
function getSessionCap() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY_CAP) || 'null'); } catch { return null; }
}
function setSessionCap(v) {
  sessionStorage.setItem(SESSION_KEY_CAP, JSON.stringify(v));
}
function getSessionResp() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY_RESP) || 'null'); } catch { return null; }
}
function setSessionResp(v) {
  sessionStorage.setItem(SESSION_KEY_RESP, JSON.stringify(v));
}
function getSessionAdmin() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY_ADMIN) || 'null'); } catch { return null; }
}
function setSessionAdmin(v) {
  sessionStorage.setItem(SESSION_KEY_ADMIN, JSON.stringify(v));
}

// Note: sessionStorage is forbidden in the artifact guidance, but the app runs
// hosted (Vercel) where it works fine. For local fallback, use in-memory.
// If sessionStorage throws, fall back to window memory.
let _sessCap = null, _sessResp = null, _sessAdmin = null;
try { sessionStorage.getItem('test'); } catch {
  // override with memory
  window.getSessionCap = () => _sessCap;
  window.setSessionCap = (v) => { _sessCap = v; };
  window.getSessionResp = () => _sessResp;
  window.setSessionResp = (v) => { _sessResp = v; };
  window.getSessionAdmin = () => _sessAdmin;
  window.setSessionAdmin = (v) => { _sessAdmin = v; };
}

// ============================================================
// TIMER LOGIC
// ============================================================
function getTimerRemaining() {
  if (state.phase === 'idle') return EPREUVE_DURATION;
  if (state.timerPaused) return state.timerRemaining || 0;
  if (!state.timerEnd) return 0;
  return Math.max(0, Math.floor((state.timerEnd - Date.now()) / 1000));
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// Check every second if phase should transition automatically
// ============================================================
// AUDIO ALERT
// ============================================================
let _audioCtx = null;

// ============================================================
// PODIUM & CONFETTIS
// ============================================================
let _confettiRAF = null;

function startConfetti() {
  const canvas = document.getElementById('podium-confetti');
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#c4963c','#1f4a38','#b85c38','#f4efe6','#3a6b55','#e8d5a3','#fff','#9A99FE'];
  const pieces = Array.from({ length: 140 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -300,
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: Math.random() * 2.5 + 1.5,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.18,
    drift: (Math.random() - 0.5) * 1.5,
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.speed; p.x += p.drift; p.angle += p.spin;
      if (p.y > canvas.height) { p.y = -12; p.x = Math.random() * canvas.width; }
    });
    _confettiRAF = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  if (_confettiRAF) { cancelAnimationFrame(_confettiRAF); _confettiRAF = null; }
  const canvas = document.getElementById('podium-confetti');
  if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function showPodium() {
  const lb = getLeaderboard();
  const top = [lb[0], lb[1], lb[2]].map(t => t ? { name: teamDisplayName(t), score: t.score } : { name: '—', score: 0 });
  const medals = ['🥇','🥈','🥉'];
  // Order: 2nd | 1st | 3rd (podium classique)
  const order = [
    { ...top[1], rank: 2, cls: 'p2', medal: medals[1] },
    { ...top[0], rank: 1, cls: 'p1', medal: medals[0] },
    { ...top[2], rank: 3, cls: 'p3', medal: medals[2] },
  ];
  const html = `
    <canvas id="podium-confetti"></canvas>
    <div class="podium-overlay" id="podium-overlay">
      <div class="podium-content">
        <div class="podium-congrats">Félicitations !</div>
        <div class="podium-sub">à toutes les équipes · challenge capeo</div>
        <div class="podium-stage">
          ${order.map(t => `
            <div class="podium-step ${t.cls}">
              <div class="podium-medal">${t.medal}</div>
              <div class="podium-name">${escapeHtml(t.name)}</div>
              <div class="podium-pts">${t.score} pts</div>
              <div class="podium-bar">${t.rank}</div>
            </div>
          `).join('')}
        </div>
        <button class="podium-close" id="podium-close-btn">Fermer</button>
      </div>
    </div>
  `;
  const wrapper = document.createElement('div');
  wrapper.id = 'podium-wrapper';
  wrapper.innerHTML = html;
  document.body.appendChild(wrapper);
  startConfetti();
  document.getElementById('podium-close-btn').onclick = closePodium;
  document.getElementById('podium-overlay').onclick = (e) => { if (e.target === e.currentTarget) closePodium(); };
}

function closePodium() {
  stopConfetti();
  const el = document.getElementById('podium-wrapper');
  if (el) el.remove();
}

// Unlock AudioContext on first user interaction (browser autoplay policy)
document.addEventListener('click',     () => { if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); else if (_audioCtx.state === 'suspended') _audioCtx.resume(); }, { once: false });
document.addEventListener('touchstart',() => { if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); else if (_audioCtx.state === 'suspended') _audioCtx.resume(); }, { once: false });

function playBeep() {
  try {
    if (!_audioCtx) return;
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const osc  = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.25, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.25);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.25);
  } catch(e) {}
}

function playEndAlarm() {
  try {
    if (!_audioCtx) return;
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const t = _audioCtx.currentTime;
    // 3 sonneries type réveil — tremolo carré à 12 Hz
    for (let ring = 0; ring < 3; ring++) {
      const s = t + ring * 0.8;
      const osc     = _audioCtx.createOscillator();
      const master  = _audioCtx.createGain();
      const lfo     = _audioCtx.createOscillator();
      const lfoGain = _audioCtx.createGain();
      // Tonalité porteuse
      osc.type = 'sine';
      osc.frequency.value = 1050;
      // LFO carré → effet sonnerie
      lfo.type = 'square';
      lfo.frequency.value = 12;
      lfoGain.gain.value = 0.35;
      lfo.connect(lfoGain);
      lfoGain.connect(master.gain);
      osc.connect(master);
      master.connect(_audioCtx.destination);
      master.gain.setValueAtTime(0.45, s);
      master.gain.setValueAtTime(0.001, s + 0.55);
      osc.start(s); osc.stop(s + 0.6);
      lfo.start(s); lfo.stop(s + 0.6);
    }
  } catch(e) {}
}

setInterval(() => {
  const route = getRoute();

  // Auto-advance the timer when it expires — ONLY on the admin device.
  // All other devices just display the timer. Without this guard, every
  // connected device would simultaneously write a new timerEnd to Supabase
  // (each with a slightly different Date.now()), causing the timer to jump.
  if (route === 'admin' &&
      state.phase !== 'idle' && !state.timerPaused &&
      state.timerEnd && Date.now() >= state.timerEnd) {
    if (state.phase === 'epreuve') {
      playEndAlarm();
      state.phase = 'transition';
      state.timerEnd = Date.now() + TRANSITION_DURATION * 1000;
      saveStatePatch({ phase: state.phase, timerEnd: state.timerEnd, timerPaused: false, currentRotation: state.currentRotation });
    } else if (state.phase === 'transition') {
      if (state.currentRotation < N_ROTATIONS) {
        state.currentRotation += 1;
        state.phase = 'epreuve';
        state.timerEnd = Date.now() + EPREUVE_DURATION * 1000;
      } else {
        state.phase = 'idle';
        state.timerEnd = null;
      }
      saveStatePatch({ phase: state.phase, timerEnd: state.timerEnd, timerPaused: false, timerRemaining: null, currentRotation: state.currentRotation });
    }
    render();
  }

  // Update timer displays on any route
  if (['screen', 'cap', 'admin', 'live', 'resp'].includes(route)) {
    updateTimerDisplays();
  }
}, 1000);

function updateTimerDisplays() {
  const remaining = getTimerRemaining();
  const isAlert = state.phase === 'epreuve' && !state.timerPaused && remaining <= 60 && remaining > 0;
  document.querySelectorAll('[data-timer]').forEach(el => {
    el.textContent = formatTime(remaining);
    el.classList.toggle('alert', isAlert);
    el.classList.toggle('paused', !!state.timerPaused);
  });
  // Bip toutes les secondes pendant la dernière minute
  if (isAlert) playBeep();
}

// ============================================================
// SCHEDULE HELPERS
// ============================================================
function getCurrentAssignments() {
  // Returns: { atelierKey: [teamId, teamId] } for current rotation
  if (state.currentRotation < 1 || state.currentRotation > N_ROTATIONS) return {};
  const rot = SCHEDULE[state.currentRotation - 1];
  const result = {};
  EPREUVES.forEach((e, i) => {
    result[e.key] = rot[i];
  });
  return result;
}

// Returns: [ [teamId, teamId], [teamId, teamId], ... ] — 5 pairs for the given atelier, one per rotation
function getAtelierScheduleForAllRotations(atelierKey) {
  const atelierIdx = EPREUVES.findIndex(e => e.key === atelierKey);
  if (atelierIdx === -1) return [];
  const pairs = [];
  for (let r = 0; r < N_ROTATIONS; r++) {
    pairs.push(SCHEDULE[r][atelierIdx]);
  }
  return pairs;
}

function getTeamAtelierForRotation(teamId, rotationNum) {
  if (rotationNum < 1 || rotationNum > N_ROTATIONS) return null;
  const rot = SCHEDULE[rotationNum - 1];
  for (let i = 0; i < EPREUVES.length; i++) {
    if (rot[i].includes(teamId)) return EPREUVES[i];
  }
  return null;
}

function getTeamOpponent(teamId, rotationNum) {
  if (rotationNum < 1 || rotationNum > N_ROTATIONS) return null;
  const rot = SCHEDULE[rotationNum - 1];
  for (let i = 0; i < EPREUVES.length; i++) {
    if (rot[i].includes(teamId)) {
      return rot[i].find(id => id !== teamId);
    }
  }
  return null;
}

function getTeamScore(teamId) {
  let total = 0;
  for (const e of EPREUVES) {
    const key = `${teamId}-${e.key}`;
    if (state.scores[key]) total += state.scores[key].points;
  }
  return total;
}

function getLeaderboard() {
  return [...state.config.teams]
    .map(t => ({ ...t, score: getTeamScore(t.id) }))
    .sort((a, b) => b.score - a.score);
}

// ============================================================
// RENDER
// ============================================================
const root = document.getElementById('app');

function render() {
  const route = getRoute();
  let content = '';
  if (route === 'screen')      content = renderBriefing();
  else if (route === 'live')   content = renderLive();
  else if (route === 'cap')    content = renderCap();
  else if (route === 'resp')   content = renderResp();
  else if (route === 'admin')  content = renderAdmin();

  root.innerHTML = renderRoleBar(route) + content;
  attachEventHandlers(route);
}

function renderRoleBar(route) {
  const roles = [
    { k: 'screen',  label: 'Projection', hash: '#/screen' },
    { k: 'live',    label: 'Live Challenge',    hash: '#/live' },
    { k: 'cap',     label: 'Capitaine', hash: '#/cap' },
    { k: 'resp',    label: 'Responsable', hash: '#/resp' },
    { k: 'admin',   label: 'Admin',   hash: '#/admin' },
  ];
  return `
    <div class="role-bar">
      ${roles.map(r => `
        <button class="${route === r.k ? 'active' : ''}" onclick="location.hash='${r.hash}'">
          ${r.label}
        </button>
      `).join('')}
    </div>
  `;
}

// ============================================================
// ============================================================
// PROJECTION SCREEN
// ============================================================
function renderTeamsCalcResult(count) {
  if (!count || count < 10) {
    return `
      <div class="brief-teams-calc-empty">
        <div class="brief-teams-calc-empty-label">En attente</div>
        <div class="brief-teams-calc-empty-hint">Saisissez le nombre pour voir la répartition</div>
      </div>
    `;
  }
  const perTeam = Math.floor(count / 10);
  const remainder = count % 10;
  let repartitionText;
  if (remainder === 0) {
    repartitionText = `<strong>${perTeam}</strong> participantes par équipe`;
  } else {
    repartitionText = `${remainder} équipe${remainder > 1 ? 's' : ''} de <strong>${perTeam + 1}</strong>, ${10 - remainder} équipe${(10 - remainder) > 1 ? 's' : ''} de <strong>${perTeam}</strong>`;
  }
  return `
    <div class="brief-teams-calc-result-num">${count}</div>
    <div class="brief-teams-calc-result-eq">÷ 10 équipes</div>
    <div class="brief-teams-calc-result-text">${repartitionText}</div>
  `;
}

// ============================================================
// BRIEFING CAROUSEL (projection d'accueil, avant le lancement)
// ============================================================
let briefingSlide = 0;
const BRIEFING_SLIDES = ['welcome', 'concept', 'epreuves', 'atelier', 'teams', 'webapp', 'go'];

function renderBriefing() {
  const slideKey = BRIEFING_SLIDES[briefingSlide];
  const slideContent = renderBriefingSlide(slideKey);
  const isFirst = briefingSlide === 0;
  const isLast = briefingSlide === BRIEFING_SLIDES.length - 1;

  return `
    <div class="brief fade-in">
      ${slideContent}
      <div class="brief-nav">
        <button class="brief-nav-btn" data-brief-action="prev" ${isFirst ? 'disabled' : ''} aria-label="Précédent">‹</button>
        <div class="brief-nav-dots">
          ${BRIEFING_SLIDES.map((_, i) => `
            <button class="brief-nav-dot ${i === briefingSlide ? 'active' : ''}" data-brief-go="${i}" aria-label="Slide ${i+1}"></button>
          `).join('')}
        </div>
        <button class="brief-nav-btn" data-brief-action="next" ${isLast ? 'disabled' : ''} aria-label="Suivant">›</button>
        <button class="brief-nav-live" data-brief-action="live">Passer en direct →</button>
      </div>
    </div>
  `;
}

// ============================================================
// LIVE DASHBOARD (ex-screen : à utiliser pendant les rotations)
// ============================================================
function renderLive() {
  const remaining = getTimerRemaining();
  const assignments = getCurrentAssignments();
  const leaderboard = getLeaderboard();
  const phaseLabel = state.phase === 'idle' ? 'En attente' :
                     state.phase === 'epreuve' ? 'Épreuve en cours' : 'Transition';
  const phaseClass = state.phase === 'epreuve' ? 'active-epreuve' :
                     state.phase === 'transition' ? 'active-transition' : '';

  const currentUrl = window.location.origin + window.location.pathname;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data=${encodeURIComponent(currentUrl)}`;

  const rotationDots = [];
  for (let i = 1; i <= N_ROTATIONS; i++) {
    const cls = i < state.currentRotation ? 'done' :
                i === state.currentRotation ? 'current' : '';
    rotationDots.push(`<div class="rotation-dot ${cls}">${i}</div>`);
    if (i < N_ROTATIONS) rotationDots.push(`<div class="rotation-line"></div>`);
  }

  return `
    <button class="live-toggle-back" onclick="location.hash='#/screen'">← Retour au briefing</button>
    <div class="screen fade-in">
      <div class="screen-header">
        <div class="screen-title-block">
          <div class="kicker">Rotation ${state.currentRotation || '—'} sur ${N_ROTATIONS}</div>
          <h1>Live <em>Challenge</em></h1>
        </div>
        <div class="timer-block">
          <div class="timer-phase ${phaseClass}">${phaseLabel}</div>
          <div class="timer-display ${state.timerPaused ? 'paused' : ''}" data-timer>${formatTime(remaining)}</div>
          <div style="margin-top:8px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-align:center">
            Rotation ${state.currentRotation > 0 ? state.currentRotation : '—'} / ${N_ROTATIONS}
          </div>
        </div>
      </div>

      <div class="rotation-indicator">${rotationDots.join('')}</div>

      <div class="screen-grid">
        <div>
          <div class="section-label">Ateliers en cours</div>
          <div class="ateliers-grid">
            ${EPREUVES.map(e => {
              const teamIds = assignments[e.key] || [];
              const names = teamIds.map(id => teamDisplayName(state.config.teams[id])).join(' vs ');
              return `
                <div class="atelier-card ${teamIds.length ? 'highlight' : ''}">
                  <div class="atelier-header">
                    <div class="atelier-letter">${e.key}</div>
                    <div class="atelier-name">${e.name}</div>
                  </div>
                  <div class="atelier-teams-label">Équipes</div>
                  <div class="${teamIds.length ? 'atelier-teams' : 'atelier-teams-empty'}">
                    ${teamIds.length ? names : 'En attente'}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div>
          <button class="section-label section-label-btn" data-action="show-podium">Classement</button>
          <div class="leaderboard">
            <div class="leaderboard-list ${state.leaderboardRevealed ? '' : 'blurred'}">
              ${leaderboard.map((t, i) => `
                <div class="leaderboard-row ${i < 3 ? 'top-' + (i+1) : ''}">
                  <div class="leaderboard-rank">${i+1}</div>
                  <div class="leaderboard-name">${escapeHtml(teamDisplayName(t))}</div>
                  <div class="leaderboard-score">${t.score}<span class="leaderboard-score-max">/12</span></div>
                </div>
              `).join('')}
            </div>
            ${!state.leaderboardRevealed ? `<div class="leaderboard-reveal-hint">Classement masqué — dévoilement par l'organisatrice</div>` : ''}
          </div>
        </div>
      </div>

      <div class="screen-footer">
        <div class="screen-footer-text">
          <div class="kicker">Scannez pour rejoindre</div>
          <div class="url">${currentUrl}</div>
        </div>
        <div class="qr-box">
          <img src="${qrUrl}" alt="QR Code" />
        </div>
      </div>
    </div>
  `;
}
